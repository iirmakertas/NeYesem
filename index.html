<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Google Fonts preconnect for faster loading on Android -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet" />
    <!-- Preload logo so it appears instantly on login screen -->
    <link rel="preload" href="/android-chrome-192x192.png" as="image" />
    <!-- Firebase DNS prefetch -->
    <link rel="dns-prefetch" href="https://firebaseapp.com" />
    <link rel="dns-prefetch" href="https://googleapis.com" />
    <!-- Prevent white/dark flash on load and sync mobile status bar -->
    <meta name="theme-color" content="#0f1117" id="theme-meta" />
    <script>
      (function() {
        const saved = localStorage.getItem('ne-yesem-theme');
        const isDark = saved !== null ? saved === 'dark' : true;
        const color = isDark ? '#0f1117' : '#fefefe';
        document.documentElement.style.backgroundColor = color;
        const meta = document.getElementById('theme-meta');
        if (meta) meta.setAttribute('content', color);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <title>Ne Yesem? | Akıllı Tarif Asistanı</title>
    <meta name="description" content="Ne yesem diye düşünmeyin! Akıllı tarif asistanı ile elinizdeki malzemelerle en iyi tarifleri bulun, zar atarak karar verin ve kendi tarif defterinizi oluşturun." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://neyesem.app/" />
    <meta property="og:title" content="Ne Yesem? | Akıllı Tarif Asistanı" />
    <meta property="og:description" content="Elinizdeki malzemelerle tarif bulun, zar atarak karar verin!" />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://neyesem.app/" />
    <meta property="twitter:title" content="Ne Yesem? | Akıllı Tarif Asistanı" />
    <meta property="twitter:description" content="Elinizdeki malzemelerle tarif bulun, zar atarak karar verin!" />
    <meta property="twitter:image" content="/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
